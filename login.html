<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>認証 - Root Team Pages</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
    }
    .lock-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.7;
    }
    h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #64748b;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .input-group {
      position: relative;
      margin-bottom: 1rem;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.875rem 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #60a5fa;
    }
    input[type="password"]::placeholder {
      color: #475569;
    }
    button {
      width: 100%;
      padding: 0.875rem 1rem;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border: none;
      border-radius: 0.5rem;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    .error {
      color: #f87171;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      display: none;
    }
    .error.show { display: block; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .shake { animation: shake 0.3s ease-in-out; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="lock-icon">🔒</div>
    <h1>Root Team Pages</h1>
    <p class="subtitle">このページは保護されています</p>
    <form id="loginForm">
      <div class="input-group">
        <input type="password" id="password" placeholder="パスワードを入力" autocomplete="off" autofocus>
      </div>
      <button type="submit">ログイン</button>
      <p class="error" id="error">パスワードが違います</p>
    </form>
  </div>

  <script>
    (function() {
      'use strict';

      function simpleHash(str) {
        var hash = 0;
        for (var i = 0; i < str.length; i++) {
          var c = str.charCodeAt(i);
          hash = ((hash << 5) - hash) + c;
          hash = hash & hash;
        }
        return Math.abs(hash).toString(36);
      }

      var PASS_HASH = simpleHash('rootteam');
      var COOKIE_NAME = 'rt_auth';

      function setCookie(name, value, days) {
        var expires = '';
        if (days) {
          var d = new Date();
          d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
          expires = '; expires=' + d.toUTCString();
        }
        document.cookie = name + '=' + value + expires + '; path=/; SameSite=Lax';
      }

      function getRedirectUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('redirect') || window.location.href.replace('login.html', 'index.html');
      }

      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var input = document.getElementById('password').value;
        var errorEl = document.getElementById('error');
        var container = document.querySelector('.login-container');

        if (simpleHash(input) === PASS_HASH) {
          // 認証成功 → Cookie 30日間保持
          setCookie(COOKIE_NAME, PASS_HASH, 30);
          window.location.replace(getRedirectUrl());
        } else {
          // 認証失敗
          errorEl.classList.add('show');
          container.classList.remove('shake');
          void container.offsetWidth; // reflow
          container.classList.add('shake');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      });
    })();
  </script>
</body>
</html>
